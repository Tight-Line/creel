{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    app.kubernetes.io/name: creel-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: creel-dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creel-dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-creel
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              until wget -qO- http://{{ .Release.Name }}-creel:{{ .Values.service.rest.port }}/v1/health > /dev/null 2>&1; do
                echo "Waiting for Creel REST API..."
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "creel.secretName" . }}
                  key: dashboard-app-key
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: LOG_CHANNEL
              value: json
            - name: SESSION_DRIVER
              value: cookie
            - name: CREEL_REST_ENDPOINT
              value: "http://{{ .Release.Name }}-creel:{{ .Values.service.rest.port }}"
            - name: CREEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "creel.secretName" . }}
                  key: bootstrap-api-key
            - name: CREEL_DASHBOARD_USERNAME
              value: {{ .Values.dashboard.auth.username | quote }}
            - name: CREEL_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "creel.secretName" . }}
                  key: dashboard-password
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
{{- end }}
