replicaCount: 1

image:
  repository: ghcr.io/tight-line/creel
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpc:
    port: 8443
  rest:
    port: 8080
  metrics:
    port: 9090

auth:
  oidcIssuer: ""
  oidcAudience: creel
  principalClaim: email
  # Required: SHA-256 hash of the system account API key.
  bootstrapKeyHash: ""

vectorBackend:
  type: pgvector
  config: {}

embedding:
  provider: ""
  model: ""
  # apiKeySecret: ""

links:
  autoLinkOnIngest: true
  autoLinkThreshold: 0.85
  maxTraversalDepth: 2

compaction:
  retainCompactedChunks: true

postgresql:
  # Set to true to deploy PostgreSQL as a StatefulSet in the cluster.
  # Set to false and provide host below for an external instance.
  install: false
  # image: pgvector/pgvector:pg17

  host: ""
  port: 5432
  name: creel
  schema: creel
  sslmode: disable

  auth:
    username: creel
    password: ""
    existingSecret: ""
    secretKey: password

  storage:
    size: 5Gi
    # storageClass: ""

mcp:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  creel:
    # Required when ingress is enabled.
    host: ""
  dashboard:
    # Required when both ingress and dashboard are enabled.
    host: ""

# Dashboard admin UI. Communicates with Creel via the REST API.
dashboard:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/tight-line/creel-dashboard
    tag: ""
    pullPolicy: IfNotPresent

  service:
    port: 3000

  auth:
    username: admin
    # Required: password for dashboard login.
    password: ""
    # Required: Creel system account API key for backend communication.
    apiKey: ""
    # Laravel encryption key (generate with: php artisan key:generate --show).
    appKey: ""
    # Alternative: reference existing Kubernetes secrets instead of inline values.
    # passwordSecret: ""
    # passwordSecretKey: password
    # apiKeySecret: ""
    # apiKeySecretKey: api-key
    # appKeySecret: ""
    # appKeySecretKey: app-key

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
