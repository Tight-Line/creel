replicaCount: 1

image:
  repository: ghcr.io/tight-line/creel
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpc:
    port: 8443
  rest:
    port: 8080
  metrics:
    port: 9090

auth:
  oidcIssuer: ""
  oidcAudience: creel
  principalClaim: email
  # Optional: provide your own API key. If empty, one is auto-generated
  # and stored in the creel-secrets Secret.
  bootstrapApiKey: ""
  # Optional: provide a pre-computed SHA-256 hash instead of the raw key.
  # If both are empty, a key and hash are auto-generated.
  bootstrapKeyHash: ""

vectorBackend:
  type: pgvector
  config: {}

embedding:
  provider: ""
  model: ""
  # apiKeySecret: ""

links:
  autoLinkOnIngest: true
  autoLinkThreshold: 0.85
  maxTraversalDepth: 2

compaction:
  retainCompactedChunks: true

postgresql:
  # Set to true to deploy PostgreSQL as a StatefulSet in the cluster.
  # Set to false and provide host below for an external instance.
  install: false
  # image: pgvector/pgvector:pg17

  host: ""
  port: 5432
  name: creel
  schema: creel
  sslmode: disable

  auth:
    username: creel
    password: ""
    existingSecret: ""
    secretKey: password

  storage:
    size: 5Gi
    # storageClass: ""

mcp:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  creel:
    # Required when ingress is enabled.
    host: ""
  dashboard:
    # Required when both ingress and dashboard are enabled.
    host: ""

# Dashboard admin UI. Communicates with Creel via the REST API.
dashboard:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/tight-line/creel-dashboard
    tag: ""
    pullPolicy: IfNotPresent

  service:
    port: 3000

  auth:
    username: admin
    # All keys below are auto-generated if empty and stored in the
    # creel-secrets Secret. Provide explicit values to override.
    password: ""
    apiKey: ""
    appKey: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
