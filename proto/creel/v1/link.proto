syntax = "proto3";

package creel.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service LinkService {
  rpc CreateLink(CreateLinkRequest) returns (Link) {
    option (google.api.http) = {
      post: "/v1/links"
      body: "*"
    };
  }
  rpc DeleteLink(DeleteLinkRequest) returns (DeleteLinkResponse) {
    option (google.api.http) = {
      delete: "/v1/links/{id}"
    };
  }
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse) {
    option (google.api.http) = {
      get: "/v1/chunks/{chunk_id}/links"
    };
  }
}

enum LinkType {
  LINK_TYPE_UNSPECIFIED = 0;
  LINK_TYPE_MANUAL = 1;
  LINK_TYPE_AUTO = 2;
  LINK_TYPE_COMPACTION_TRANSFER = 3;
}

message Link {
  string id = 1;
  string source_chunk_id = 2;
  string target_chunk_id = 3;
  LinkType link_type = 4;
  string created_by = 5;
  google.protobuf.Struct metadata = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateLinkRequest {
  string source_chunk_id = 1;
  string target_chunk_id = 2;
  LinkType link_type = 3;
  google.protobuf.Struct metadata = 4;
}

message DeleteLinkRequest {
  string id = 1;
}

message DeleteLinkResponse {}

message ListLinksRequest {
  string chunk_id = 1;
  bool include_backlinks = 2;
}

message ListLinksResponse {
  repeated Link links = 1;
}
