{{- $secretName := include "creel.secretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{/*
Bootstrap API key: user-provided > existing secret > auto-generate.
*/}}
{{- $bootstrapApiKey := "" -}}
{{- if .Values.auth.bootstrapApiKey -}}
  {{- $bootstrapApiKey = .Values.auth.bootstrapApiKey -}}
{{- else if and $existingSecret (index $existingSecret.data "bootstrap-api-key") -}}
  {{- $bootstrapApiKey = index $existingSecret.data "bootstrap-api-key" | b64dec -}}
{{- else -}}
  {{- $bootstrapApiKey = printf "creel_%s" (randAlphaNum 40) -}}
{{- end -}}

{{/*
Bootstrap key hash: user-provided > derived from API key.
*/}}
{{- $bootstrapKeyHash := "" -}}
{{- if .Values.auth.bootstrapKeyHash -}}
  {{- $bootstrapKeyHash = .Values.auth.bootstrapKeyHash -}}
{{- else -}}
  {{- $bootstrapKeyHash = $bootstrapApiKey | sha256sum -}}
{{- end -}}

{{/*
Laravel APP_KEY: user-provided > existing secret > auto-generate.
*/}}
{{- $appKey := "" -}}
{{- if .Values.dashboard.auth.appKey -}}
  {{- $appKey = .Values.dashboard.auth.appKey -}}
{{- else if and $existingSecret (index $existingSecret.data "dashboard-app-key") -}}
  {{- $appKey = index $existingSecret.data "dashboard-app-key" | b64dec -}}
{{- else -}}
  {{- $appKey = printf "base64:%s" (randBytes 32) -}}
{{- end -}}

{{/*
Dashboard password: user-provided > existing secret > auto-generate.
*/}}
{{- $dashboardPassword := "" -}}
{{- if .Values.dashboard.auth.password -}}
  {{- $dashboardPassword = .Values.dashboard.auth.password -}}
{{- else if and $existingSecret (index $existingSecret.data "dashboard-password") -}}
  {{- $dashboardPassword = index $existingSecret.data "dashboard-password" | b64dec -}}
{{- else -}}
  {{- $dashboardPassword = randAlphaNum 24 -}}
{{- end -}}

{{/*
PostgreSQL password: user-provided > existing secret > auto-generate.
Ignored when postgresql.auth.existingSecret is set (external secret management).
*/}}
{{- $pgPassword := "" -}}
{{- if .Values.postgresql.auth.existingSecret -}}
  {{- $pgPassword = "" -}}
{{- else if .Values.postgresql.auth.password -}}
  {{- $pgPassword = .Values.postgresql.auth.password -}}
{{- else if and $existingSecret (index $existingSecret.data "postgresql-password") -}}
  {{- $pgPassword = index $existingSecret.data "postgresql-password" | b64dec -}}
{{- else -}}
  {{- $pgPassword = randAlphaNum 32 -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: creel
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  bootstrap-api-key: {{ $bootstrapApiKey | quote }}
  bootstrap-key-hash: {{ $bootstrapKeyHash | quote }}
  dashboard-app-key: {{ $appKey | quote }}
  dashboard-password: {{ $dashboardPassword | quote }}
  {{- if not .Values.postgresql.auth.existingSecret }}
  postgresql-password: {{ $pgPassword | quote }}
  {{- end }}
  creel.yaml: |
    server:
      grpc_port: {{ .Values.service.grpc.port }}
      rest_port: {{ .Values.service.rest.port }}
      metrics_port: {{ .Values.service.metrics.port }}
    auth:
      principal_claim: {{ .Values.auth.principalClaim }}
      {{- if .Values.auth.oidcIssuer }}
      providers:
        - issuer: {{ .Values.auth.oidcIssuer }}
          audience: {{ .Values.auth.oidcAudience }}
      {{- end }}
      api_keys:
        - name: bootstrap
          key_hash: {{ $bootstrapKeyHash | quote }}
          principal: "system:bootstrap"
    postgres:
      host: {{ .Values.postgresql.host | default (printf "%s-postgresql" .Release.Name) | quote }}
      port: {{ .Values.postgresql.port }}
      user: {{ .Values.postgresql.auth.username | quote }}
      name: {{ .Values.postgresql.name | quote }}
      schema: {{ .Values.postgresql.schema | default "creel" | quote }}
      sslmode: {{ .Values.postgresql.sslmode | default "disable" | quote }}
    vector_backend:
      type: {{ .Values.vectorBackend.type }}
    links:
      auto_link_on_ingest: {{ .Values.links.autoLinkOnIngest }}
      auto_link_threshold: {{ .Values.links.autoLinkThreshold }}
      max_traversal_depth: {{ .Values.links.maxTraversalDepth }}
    compaction:
      retain_compacted_chunks: {{ .Values.compaction.retainCompactedChunks }}
