# Creel server configuration
# Copy to creel.yaml and adjust for your environment.

server:
  grpc_port: 8443
  rest_port: 8080
  metrics_port: 9090

auth:
  principal_claim: sub
  groups_claim: groups

  # OIDC providers for JWT-based authentication.
  # providers:
  #   - issuer: https://accounts.google.com
  #     audience: creel

  # Static API keys for service authentication.
  # The dev key below is pre-configured for local development.
  # Its plaintext value is in .env; source that file before using creel-cli.
  api_keys:
    - name: dev
      key_hash: "1874bc60df48100e6655e1a4355d9452edd5dffa3cbd92df6046c49831952757"
      principal: "dev"

# Required. PostgreSQL connection parameters.
postgres:
  host: localhost
  port: 5432
  user: creel
  password: creel
  name: creel
  schema: creel
  sslmode: disable

vector_backend:
  type: pgvector
  # config:
  #   url: postgres://creel:creel@localhost:5432/creel?sslmode=disable

# embedding:
#   provider: openai
#   model: text-embedding-3-small
#   api_key: sk-...

links:
  auto_link_on_ingest: true
  auto_link_threshold: 0.85
  max_traversal_depth: 2

compaction:
  retain_compacted_chunks: true

# AES-256-GCM encryption key for API key configs (64 hex chars = 32 bytes).
# Required for config management features. Generate with:
#   openssl rand -hex 32
# encryption_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
