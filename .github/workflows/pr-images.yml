name: PR Images

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  ENABLE_ARM64: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    strategy:
      matrix:
        image:
          - name: creel
            context: .
            file: deploy/docker/Dockerfile
          - name: creel-dashboard
            context: ./dashboard
            file: dashboard/Dockerfile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          echo "TAG=pr-${PR_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Build amd64 first for fast availability (native build)
      - name: Build and push ${{ matrix.image.name }} (amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ steps.meta.outputs.TAG }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image.name }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-pr

      # Then build multi-arch (updates tags in-place with manifest)
      - name: Build and push ${{ matrix.image.name }} (multi-arch)
        if: env.ENABLE_ARM64 == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ steps.meta.outputs.TAG }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.image.name }}-pr
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-pr

      - name: Comment on PR with image tags
        if: matrix.image.name == 'creel'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.TAG }}';
            const prefix = '${{ steps.meta.outputs.IMAGE_PREFIX }}';
            const body = `## Docker Images Built

            Images are available for testing:

            \`\`\`bash
            docker pull ${prefix}/creel:${tag}
            docker pull ${prefix}/creel-dashboard:${tag}
            \`\`\`

            ### Helm install (lab values override)
            \`\`\`yaml
            image:
              tag: "${tag}"
            dashboard:
              image:
                tag: "${tag}"
            \`\`\`

            Images expire ~15 days after PR closes.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Docker Images Built')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
