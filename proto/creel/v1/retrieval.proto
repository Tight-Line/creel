syntax = "proto3";

package creel.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "creel/v1/chunk.proto";
import "creel/v1/link.proto";

service RetrievalService {
  rpc Search(SearchRequest) returns (SearchResponse) {
    option (google.api.http) = {
      post: "/v1/search"
      body: "*"
    };
  }
  rpc GetContext(GetContextRequest) returns (GetContextResponse) {
    option (google.api.http) = {
      get: "/v1/documents/{document_id}/context"
    };
  }
}

message SearchRequest {
  repeated string topic_ids = 1;
  repeated double query_embedding = 2;
  string query_text = 3;
  int32 top_k = 4;
  bool follow_links = 5;
  int32 link_depth = 6;
  google.protobuf.Struct metadata_filter = 7;
  repeated string exclude_document_ids = 8;
}

message DocumentCitation {
  string id = 1;
  string slug = 2;
  string name = 3;
  string url = 4;
  string author = 5;
  google.protobuf.Timestamp published_at = 6;
  google.protobuf.Struct metadata = 7;
}

message SearchResult {
  Chunk chunk = 1;
  string document_id = 2;
  string topic_id = 3;
  double score = 4;
  Link via_link = 5;
  DocumentCitation document_citation = 6;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message GetContextRequest {
  string document_id = 1;
  int32 last_n = 2;
  google.protobuf.Timestamp since = 3;
  bool include_summaries = 4;
}

message GetContextResponse {
  repeated Chunk chunks = 1;
}
