{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    app.kubernetes.io/name: creel-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: creel-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
