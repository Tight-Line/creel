syntax = "proto3";

package creel.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service AdminService {
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // System account management
  rpc CreateSystemAccount(CreateSystemAccountRequest) returns (CreateSystemAccountResponse) {
    option (google.api.http) = {
      post: "/v1/admin/accounts"
      body: "*"
    };
  }
  rpc ListSystemAccounts(ListSystemAccountsRequest) returns (ListSystemAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/accounts"
    };
  }
  rpc DeleteSystemAccount(DeleteSystemAccountRequest) returns (DeleteSystemAccountResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/accounts/{id}"
    };
  }
  rpc RotateKey(RotateKeyRequest) returns (RotateKeyResponse) {
    option (google.api.http) = {
      post: "/v1/admin/accounts/{account_id}/rotate"
      body: "*"
    };
  }
  rpc RevokeKey(RevokeKeyRequest) returns (RevokeKeyResponse) {
    option (google.api.http) = {
      post: "/v1/admin/accounts/{account_id}/revoke"
    };
  }

  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/stats"
    };
  }
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
}

message SystemAccount {
  string id = 1;
  string name = 2;
  string description = 3;
  string principal = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateSystemAccountRequest {
  string name = 1;
  string description = 2;
}

message CreateSystemAccountResponse {
  SystemAccount account = 1;
  string api_key = 2;  // returned only on creation; not retrievable afterward
}

message ListSystemAccountsRequest {}

message ListSystemAccountsResponse {
  repeated SystemAccount accounts = 1;
}

message DeleteSystemAccountRequest {
  string id = 1;
}

message DeleteSystemAccountResponse {}

message RotateKeyRequest {
  string account_id = 1;
  int32 grace_period_seconds = 2;  // how long the old key remains valid (0 = no grace)
}

message RotateKeyResponse {
  string api_key = 1;  // the new key; not retrievable afterward
}

message RevokeKeyRequest {
  string account_id = 1;
}

message RevokeKeyResponse {}

message GetStatsRequest {}

message GetStatsResponse {
  int64 api_key_configs = 1;
  int64 llm_configs = 2;
  int64 embedding_configs = 3;
  int64 extraction_prompt_configs = 4;
  int64 topics = 5;
  int64 system_accounts = 6;
  int64 documents = 7;
  int64 chunks = 8;
  int64 memories = 9;
}
