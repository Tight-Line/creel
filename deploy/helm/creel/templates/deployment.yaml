{{- include "creel.validateRequired" . -}}
{{- $secretName := include "creel.secretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-creel
  labels:
    app.kubernetes.io/name: creel
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: creel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creel
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-migrations
          image: {{ .Values.postgresql.image | default "pgvector/pgvector:pg17" }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready. Waiting for migrations..."
              until psql -c "SELECT 1 FROM {{ .Values.postgresql.schema | default "creel" }}.schema_migrations LIMIT 1" > /dev/null 2>&1; do
                echo "Waiting for schema migrations..."
                sleep 2
              done
              echo "Migrations complete."
          env:
            - name: PGHOST
              value: {{ .Values.postgresql.host | default (printf "%s-postgresql" .Release.Name) | quote }}
            - name: PGPORT
              value: {{ .Values.postgresql.port | quote }}
            - name: PGUSER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgresql.name | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.auth.existingSecret }}
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.secretKey | default "password" }}
                  {{- else }}
                  name: {{ $secretName }}
                  key: postgresql-password
                  {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: creel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/creel/creel.yaml"
          env:
            - name: CREEL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.auth.existingSecret }}
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.secretKey | default "password" }}
                  {{- else }}
                  name: {{ $secretName }}
                  key: postgresql-password
                  {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
            - name: rest
              containerPort: {{ .Values.service.rest.port }}
            - name: metrics
              containerPort: {{ .Values.service.metrics.port }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: rest
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/creel
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.mcp.enabled }}
        - name: creel-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["creel-mcp"]
          env:
            - name: CREEL_ENDPOINT
              value: "127.0.0.1:{{ .Values.service.grpc.port }}"
            - name: CREEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: bootstrap-api-key
          stdin: true
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ $secretName }}
            items:
              - key: creel.yaml
                path: creel.yaml
