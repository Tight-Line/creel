syntax = "proto3";

package creel.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service TopicService {
  rpc CreateTopic(CreateTopicRequest) returns (Topic) {
    option (google.api.http) = {
      post: "/v1/topics"
      body: "*"
    };
  }
  rpc GetTopic(GetTopicRequest) returns (Topic) {
    option (google.api.http) = {
      get: "/v1/topics/{id}"
    };
  }
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse) {
    option (google.api.http) = {
      get: "/v1/topics"
    };
  }
  rpc UpdateTopic(UpdateTopicRequest) returns (Topic) {
    option (google.api.http) = {
      patch: "/v1/topics/{id}"
      body: "*"
    };
  }
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse) {
    option (google.api.http) = {
      delete: "/v1/topics/{id}"
    };
  }
  rpc GrantAccess(GrantAccessRequest) returns (TopicGrant) {
    option (google.api.http) = {
      post: "/v1/topics/{topic_id}/grants"
      body: "*"
    };
  }
  rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse) {
    option (google.api.http) = {
      delete: "/v1/topics/{topic_id}/grants/{principal}"
    };
  }
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse) {
    option (google.api.http) = {
      get: "/v1/topics/{topic_id}/grants"
    };
  }
}

message Topic {
  string id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  string owner = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  optional string llm_config_id = 8;
  optional string embedding_config_id = 9;
  optional string extraction_prompt_config_id = 10;
  optional ChunkingStrategy chunking_strategy = 11;
  bool memory_enabled = 12;
  optional string vector_backend_config_id = 13;
}

message ChunkingStrategy {
  int32 chunk_size = 1;
  int32 chunk_overlap = 2;
}

message TopicGrant {
  string id = 1;
  string topic_id = 2;
  string principal = 3;
  Permission permission = 4;
  string granted_by = 5;
  google.protobuf.Timestamp created_at = 6;
}

enum Permission {
  PERMISSION_UNSPECIFIED = 0;
  PERMISSION_READ = 1;
  PERMISSION_WRITE = 2;
  PERMISSION_ADMIN = 3;
}

message CreateTopicRequest {
  string slug = 1;
  string name = 2;
  string description = 3;
  optional string llm_config_id = 4;
  optional string embedding_config_id = 5;
  optional string extraction_prompt_config_id = 6;
  bool memory_enabled = 7;
  optional string vector_backend_config_id = 8;
}

message GetTopicRequest {
  string id = 1;
}

message ListTopicsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListTopicsResponse {
  repeated Topic topics = 1;
  string next_page_token = 2;
}

message UpdateTopicRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  optional string llm_config_id = 4;
  optional string embedding_config_id = 5;
  optional string extraction_prompt_config_id = 6;
  optional bool memory_enabled = 7;
  optional string vector_backend_config_id = 8;
}

message DeleteTopicRequest {
  string id = 1;
}

message DeleteTopicResponse {}

message GrantAccessRequest {
  string topic_id = 1;
  string principal = 2;
  Permission permission = 3;
}

message RevokeAccessRequest {
  string topic_id = 1;
  string principal = 2;
}

message RevokeAccessResponse {}

message ListGrantsRequest {
  string topic_id = 1;
}

message ListGrantsResponse {
  repeated TopicGrant grants = 1;
}
