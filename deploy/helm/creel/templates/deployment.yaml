apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-creel
  labels:
    app.kubernetes.io/name: creel
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: creel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creel
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: creel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/creel/creel.yaml"
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
            - name: rest
              containerPort: {{ .Values.service.rest.port }}
            - name: metrics
              containerPort: {{ .Values.service.metrics.port }}
          livenessProbe:
            grpc:
              port: {{ .Values.service.grpc.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            grpc:
              port: {{ .Values.service.grpc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/creel
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-creel-config
