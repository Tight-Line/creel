services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: creel
      POSTGRES_PASSWORD: creel
      POSTGRES_DB: creel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creel"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CREEL_POSTGRES_HOST: postgres
    command: ["--config", "/etc/creel/creel.yaml", "--migrate"]
    volumes:
      - ./creel.example.yaml:/etc/creel/creel.yaml:ro
      - ./migrations:/app/migrations:ro

  creel:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8443:8443"
      - "8080:8080"
      - "9090:9090"
    environment:
      CREEL_POSTGRES_HOST: postgres
    command: ["--config", "/etc/creel/creel.yaml"]
    volumes:
      - ./creel.example.yaml:/etc/creel/creel.yaml:ro

volumes:
  pgdata:
