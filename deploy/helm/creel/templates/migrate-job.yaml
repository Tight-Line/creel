{{- $secretName := include "creel.secretName" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/name: creel-migrate
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creel-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      {{- if .Values.postgresql.install }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgresql.image | default "pgvector/pgvector:pg17" }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/creel/creel.yaml"
            - "--migrate"
          env:
            - name: CREEL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.auth.existingSecret }}
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.secretKey | default "password" }}
                  {{- else }}
                  name: {{ $secretName }}
                  key: postgresql-password
                  {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/creel
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: {{ $secretName }}
            items:
              - key: creel.yaml
                path: creel.yaml
