replicaCount: 1

image:
  repository: ghcr.io/tight-line/creel
  tag: ""
  pullPolicy: IfNotPresent

service:
  grpc:
    port: 8443
  rest:
    port: 8080
  metrics:
    port: 9090

auth:
  oidcIssuer: ""
  oidcAudience: creel
  principalClaim: email
  bootstrapKeyHash: ""

vectorBackend:
  type: pgvector
  config: {}

embedding:
  provider: ""
  model: ""
  # apiKeySecret: ""

links:
  autoLinkOnIngest: true
  autoLinkThreshold: 0.85
  maxTraversalDepth: 2

compaction:
  retainCompactedChunks: true

postgresql:
  # "helm" installs PostgreSQL via CloudNativePG subchart.
  # "external" uses a user-managed instance (provide host below).
  source: external
  # Set to true when source is "helm" to enable the CloudNativePG subchart.
  install: false

  host: ""
  port: 5432
  name: creel
  schema: creel
  sslmode: disable

  auth:
    username: creel
    password: ""
    existingSecret: ""
    secretKey: password

mcp:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
